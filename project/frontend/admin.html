<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StreetBite Admin</title>
    <style>
      body {
        font-family: sans-serif;
        background: #0f0e0d;
        color: #f0ebe4;
        padding: 40px;
        display: flex;
        gap: 40px;
        align-items: flex-start;
      }
      .panel {
        background: #222120;
        padding: 30px;
        border-radius: 12px;
        flex: 1;
        border: 1px solid #2e2c2a;
      }
      h1,
      h2 {
        color: #ff5c1a;
        margin-top: 0;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-size: 0.9rem;
        color: #857f78;
      }
      input,
      select,
      textarea {
        width: 100%;
        padding: 10px;
        background: #1a1917;
        border: 1px solid #2e2c2a;
        color: white;
        border-radius: 6px;
        box-sizing: border-box;
      }
      button {
        width: 100%;
        padding: 12px;
        background: #ff5c1a;
        color: white;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
      }
      button:hover {
        background: #e04810;
      }
      .delete-btn {
        background: #f05252;
        padding: 6px;
        width: auto;
        margin: 0;
      }
      .delete-btn:hover {
        background: #d03030;
      }

      .menu-list {
        list-style: none;
        padding: 0;
      }
      .menu-list li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 0;
        border-bottom: 1px solid #2e2c2a;
      }
      #status {
        margin-top: 15px;
        text-align: center;
        color: #3ecf8e;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>🍔 Add Menu Item</h1>
      <form id="addForm">
        <div class="form-group">
          <label>Item Name</label><input type="text" id="name" required />
        </div>
        <div class="form-group">
          <label>Price (₹)</label
          ><input type="number" id="price" step="0.01" required />
        </div>
        <div class="form-group">
          <label>Category</label><input type="text" id="cat" required />
        </div>
        <div class="form-group">
          <label>Description</label
          ><textarea id="desc" rows="2" required></textarea>
        </div>
        <div class="form-group">
          <label>Image URL</label><input type="text" id="image_url" />
        </div>
        <div class="form-group">
          <label>Emoji</label><input type="text" id="emoji" value="🍔" />
        </div>
        <div class="form-group">
          <label><input type="checkbox" id="spicy" /> Spicy? 🌶️</label>
        </div>
        <button type="submit">Save to Database</button>
        <div id="status">✅ Success!</div>
      </form>
    </div>

    <div class="panel">
      <h2>📋 Current Menu</h2>
      <ul class="menu-list" id="currentMenu"></ul>
    </div>

    <script>
      // 1. ASK FOR PASSWORD ON LOAD
      const API_KEY = prompt("Enter Admin Password to access database:");

      // 2. FETCH AND DISPLAY CURRENT MENU
      async function loadMenu() {
        const res = await fetch("https://streetbite-pos.onrender.com/api/menu/1");
        const menu = await res.json();

        const list = document.getElementById("currentMenu");
        list.innerHTML = menu
          .map(
            (item) => `
        <li>
          <span>${item.emoji || ""} <b>${item.name}</b> (₹${item.price})</span>
          <button class="delete-btn" onclick="deleteItem(${item.id})">Delete</button>
        </li>
      `,
          )
          .join("");
      }

      // 3. DELETE ITEM FUNCTION
      async function deleteItem(id) {
        if (!confirm("Are you sure you want to delete this item?")) return;

        const res = await fetch(`https://streetbite-pos.onrender.com/api/menu/${id}`, {
          method: "DELETE",
          headers: { "x-api-key": API_KEY }, // Sending the secret password!
        });

        if (res.ok) {
          loadMenu(); // Refresh the list
        } else {
          alert("Failed to delete. Did you enter the right password?");
        }
      }

      // 4. ADD ITEM FUNCTION
      document
        .getElementById("addForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const newItem = {
            restaurant_id: 1,
            name: document.getElementById("name").value,
            price: parseFloat(document.getElementById("price").value),
            cat: document.getElementById("cat").value,
            desc: document.getElementById("desc").value,
            image_url: document.getElementById("image_url").value || null,
            emoji: document.getElementById("emoji").value,
            spicy: document.getElementById("spicy").checked,
          };

          const res = await fetch("https://streetbite-pos.onrender.com/api/menu/", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": API_KEY, // Sending the secret password!
            },
            body: JSON.stringify(newItem),
          });

          if (res.ok) {
            document.getElementById("addForm").reset();
            loadMenu(); // Refresh the list
          } else {
            alert("Failed to add. Did you enter the right password?");
          }
        });

      // Load menu when page opens
      loadMenu();
    </script>
  </body>
</html>
